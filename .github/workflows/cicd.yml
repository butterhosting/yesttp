on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_MAJOR_VERSION: "24"

jobs:
  main:
    name: "CICD Pipeline"
    runs-on: ubuntu-latest

    steps:
      - name: "Environment :: Setup"
        uses: actions/checkout@v6

      - name: "Environment :: Node"
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_MAJOR_VERSION }}
          cache: "npm"

      - name: "Setup :: Installation"
        run: npm install

      - name: "Application :: Type Checking"
        run: npm run tc

      - name: "Application :: Build"
        run: npm run build

      - name: "Application :: Tests"
        run: npm run test

      - name: "Release :: Set Version"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Releasing: $GITHUB_REF_NAME"
          npm version $GITHUB_REF_NAME --git-tag-version false

      - name: "Deployment :: Publish to NPM"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish --access public
